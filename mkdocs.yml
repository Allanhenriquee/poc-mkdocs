site_name: Plataforma de Pedidos
site_description: Documentação técnica da plataforma de pedidos e pagamentos
site_author: Time de Engenharia
site_url: https://Allanhenriquee.github.io/poc-mkdocs

repo_name: Allanhenriquee/poc-mkdocs
repo_url: https://github.com/Allanhenriquee/poc-mkdocs

theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Alternar para modo claro
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Alternar para modo escuro
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/rocket-launch

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  alternate:
    - name: Português
      link: /poc-mkdocs/
      lang: pt-BR
    - name: English
      link: /poc-mkdocs/en/
      lang: en

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Início: index.md
  - Arquitetura:
      - Visão Geral: architecture/overview.md
      - Decisões (ADR): architecture/adr-001-event-driven.md
  - API:
      - Referência: api/reference.md
      - Interativa (Scalar): api/scalar.md
  - Eventos Assíncronos:
      - Spec Manual (YAML): api/asyncapi.md
      - Gerado do Código (Saunter): api/asyncapi-generated.md
  - Guias:
      - Configuração Local: guides/local-setup.md
