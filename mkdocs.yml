site_name: Plataforma de Pedidos
site_description: Documentação técnica da plataforma de pedidos e pagamentos
site_author: Time de Engenharia
site_url: https://Allanhenriquee.github.io/poc-mkdocs

repo_name: Allanhenriquee/poc-mkdocs
repo_url: https://github.com/Allanhenriquee/poc-mkdocs

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Alternar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Alternar para modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Início: index.md
  - Arquitetura:
      - Visão Geral: architecture/overview.md
      - Decisões (ADR): architecture/adr-001-event-driven.md
  - API:
      - Referência: api/reference.md
  - Guias:
      - Configuração Local: guides/local-setup.md
