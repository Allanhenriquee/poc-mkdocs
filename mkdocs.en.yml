site_name: Orders Platform
site_description: Technical documentation for the orders and payments platform
site_author: Engineering Team
site_url: https://Allanhenriquee.github.io/poc-mkdocs/en/

repo_name: Allanhenriquee/poc-mkdocs
repo_url: https://github.com/Allanhenriquee/poc-mkdocs

docs_dir: docs_en
theme:
  name: material
  custom_dir: overrides_en
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/rocket-launch

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  alternate:
    - name: Português
      link: /poc-mkdocs/
      lang: pt-BR
    - name: English
      link: /poc-mkdocs/en/
      lang: en

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Decisions (ADR): architecture/adr-001-event-driven.md
  - API:
      - Reference: api/reference.md
      - Interactive (Scalar): api/scalar.md
  - Manual Events: api/asyncapi.md
  - Auto Events: api/asyncapi-generated.md
  - Guides:
      - Local Setup: guides/local-setup.md
