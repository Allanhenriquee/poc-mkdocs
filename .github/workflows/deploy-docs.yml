name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs-material ghp-import

      # Build PT-BR into site/
      - name: Build PT-BR site
        run: mkdocs build --config-file mkdocs.yml --site-dir site

      # Build EN into site/en/ (merges into the same output folder)
      - name: Build EN site
        run: mkdocs build --config-file mkdocs.en.yml --site-dir site/en

      # Push the combined site/ folder to gh-pages in a single commit
      - name: Deploy to GitHub Pages
        run: ghp-import -n -p -f site
