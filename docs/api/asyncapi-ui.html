<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>AsyncAPI — Plataforma de Pedidos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    .back-link {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 10000;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: rgba(14, 14, 26, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      color: rgba(210, 210, 235, 0.9);
      text-decoration: none;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.4);
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .back-link:hover {
      background: rgba(28, 28, 52, 0.96);
      border-color: rgba(96, 195, 255, 0.3);
      color: #fff;
    }

    .back-link svg {
      flex-shrink: 0;
      opacity: 0.75;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #6b7280;
      font-size: 14px;
      gap: 8px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    asyncapi-component {
      display: block;
    }
  </style>
</head>
<body>
  <a class="back-link" href="../">
    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13"
         viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Voltar à documentação
  </a>

  <div id="loading">
    <span class="spinner"></span>
    Carregando contratos de eventos…
  </div>

  <asyncapi-component
    id="asyncapi-comp"
    config='{"show":{"sidebar":true,"info":true,"servers":true,"operations":true,"messages":true,"schemas":true}}'
  ></asyncapi-component>

  <script>
    (function () {
      var parts = window.location.pathname.split('/');
      parts.splice(-2); // remove 'api' e 'asyncapi-ui.html'
      var specUrl = window.location.origin + parts.join('/') + '/asyncapi.yaml';

      function loadSpec() {
        fetch(specUrl)
          .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
          })
          .then(function (yaml) {
            var loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';

            var comp = document.getElementById('asyncapi-comp');
            if (comp) comp.schema = yaml;
          })
          .catch(function (err) {
            var loading = document.getElementById('loading');
            if (loading) {
              loading.innerHTML =
                '<span style="color:#ef4444">Erro ao carregar spec: ' + err.message + '</span>';
            }
          });
      }

      // Aguarda o custom element ser registrado pelo CDN script antes de setar a propriedade
      if (typeof customElements !== 'undefined') {
        customElements.whenDefined('asyncapi-component').then(loadSpec);
      } else {
        window.addEventListener('load', loadSpec);
      }
    })();
  </script>

  <script src="https://unpkg.com/@asyncapi/web-component/lib/asyncapi-web-component.js" defer></script>
</body>
</html>
