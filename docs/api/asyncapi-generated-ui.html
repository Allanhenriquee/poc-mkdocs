<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>AsyncAPI Gerado do Código — Plataforma de Pedidos</title>
  <style>
    :root {
      --bg:        #0f0f17;
      --surface:   #16161f;
      --surface2:  #1e1e2e;
      --border:    rgba(255,255,255,0.07);
      --text:      #e2e8f0;
      --dim:       #94a3b8;
      --faint:     #3d4460;
      --accent:    #60c3ff;
      --accent-bg: rgba(96,195,255,0.08);
      --pub:       #10b981;
      --pub-bg:    rgba(16,185,129,0.1);
      --sub:       #a78bfa;
      --sub-bg:    rgba(167,139,250,0.1);
      --badge-bg:  rgba(139,92,246,0.12);
      --badge-cl:  #a78bfa;
      --r:         8px;
      --sw:        260px;
      --hh:        52px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, 'Inter', system-ui, sans-serif; font-size: 13.5px; line-height: 1.6; }

    /* ── Top bar ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--hh);
      background: rgba(15,15,23,0.96); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; padding: 0 20px; z-index: 200;
    }
    .back { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
      color: var(--dim); text-decoration: none; font-size: 12px; font-weight: 500;
      transition: color .15s, border-color .15s; flex-shrink: 0; }
    .back:hover { color: var(--text); border-color: var(--accent); }
    .back svg { opacity: .65; }
    .topbar-info { flex: 1; display: flex; align-items: baseline; gap: 8px; overflow: hidden; }
    .topbar-title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-ver { font-size: 11px; color: var(--dim); white-space: nowrap; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
      background: var(--badge-bg); border: 1px solid rgba(96,195,255,0.25); border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: .04em; color: var(--badge-cl); white-space: nowrap; }

    /* ── Layout ── */
    .layout { display: flex; height: 100vh; padding-top: var(--hh); }

    /* ── Sidebar ── */
    .sidebar { width: var(--sw); flex-shrink: 0; overflow-y: auto;
      background: var(--surface); border-right: 1px solid var(--border); padding: 12px 0 24px; }
    .sg-label { padding: 10px 16px 4px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; color: var(--faint); }
    .si { display: flex; align-items: center; gap: 7px; padding: 6px 16px;
      color: var(--dim); font-size: 12.5px; cursor: pointer; text-decoration: none;
      border-left: 2px solid transparent; transition: color .12s, background .12s; }
    .si:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .si.active { color: var(--accent); background: var(--accent-bg); border-left-color: var(--accent); }
    .ob { font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 3px;
      letter-spacing: .04em; flex-shrink: 0; }
    .ob.pub { background: var(--pub-bg); color: var(--pub); }
    .ob.sub { background: var(--sub-bg); color: var(--sub); }

    /* ── Main ── */
    .main { flex: 1; overflow-y: auto; padding: 28px 36px 48px; }

    /* ── Typography ── */
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .api-ver { font-size: 12px; color: var(--dim); margin-bottom: 16px; }
    h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      color: var(--dim); margin: 32px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    h3 { font-size: 13px; font-weight: 600; margin: 16px 0 6px; color: var(--text); }
    p { color: var(--dim); margin-bottom: 10px; }
    code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 11.5px;
      background: var(--surface2); padding: 1px 5px; border-radius: 4px; color: var(--accent); }
    pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r);
      padding: 14px 16px; overflow-x: auto; font-family: monospace; font-size: 12px;
      color: #a5c3e8; margin-bottom: 14px; }
    ul { padding-left: 20px; color: var(--dim); }
    li { margin-bottom: 4px; }
    strong { color: var(--text); }

    /* ── Description box ── */
    .desc-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 14px 18px; margin-bottom: 16px; color: var(--dim); font-size: 13px; }
    .desc-box h3 { margin: 10px 0 4px; }

    /* ── Server cards ── */
    .servers { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 4px; }
    .srv { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 12px 16px; flex: 1; min-width: 180px; }
    .srv-name { font-weight: 600; font-size: 12.5px; margin-bottom: 3px; }
    .srv-url  { font-family: monospace; font-size: 12px; color: var(--accent); }
    .srv-proto { display: inline-block; margin-top: 5px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; padding: 2px 7px; border-radius: 4px;
      background: var(--accent-bg); color: var(--accent); letter-spacing: .05em; }
    .srv-desc { font-size: 12px; color: var(--dim); margin-top: 4px; }

    /* ── Channel cards ── */
    .ch-card { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 14px; }
    .ch-head { display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; border-bottom: 1px solid var(--border); background: var(--surface2);
      border-radius: var(--r) var(--r) 0 0; }
    .ch-name { font-family: monospace; font-size: 13px; font-weight: 600; flex: 1; }
    .ch-body { padding: 14px 16px; }
    .ch-desc { color: var(--dim); font-size: 13px; margin-bottom: 10px; }
    .op-row  { display: flex; gap: 8px; font-size: 12.5px; margin-bottom: 5px; align-items: flex-start; }
    .op-lbl  { color: var(--faint); min-width: 80px; font-size: 11.5px; text-transform: uppercase;
      letter-spacing: .04em; padding-top: 2px; }

    /* ── Message cards ── */
    .msg-card { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 14px; }
    .msg-head { padding: 11px 16px; border-bottom: 1px solid var(--border);
      background: var(--surface2); border-radius: var(--r) var(--r) 0 0; }
    .msg-name { font-weight: 600; font-size: 13px; }
    .msg-sum  { font-size: 12px; color: var(--dim); margin-top: 2px; }
    .msg-body { padding: 14px 16px; }

    /* ── Schema table ── */
    .schema-tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 8px; }
    .schema-tbl th { text-align: left; padding: 6px 10px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--faint);
      border-bottom: 1px solid var(--border); }
    .schema-tbl td { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.03);
      vertical-align: top; }
    .schema-tbl tr:last-child td { border-bottom: none; }
    .fn { font-family: monospace; color: var(--accent); font-size: 11.5px; }
    .fn.req::after { content: '*'; color: #f87171; margin-left: 2px; }
    .typ { display: inline-block; font-family: monospace; font-size: 11px;
      padding: 1px 6px; border-radius: 4px; background: var(--surface2); color: #c4a4f5; }

    /* ── Source identification banner ── */
    .source-banner {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; margin-bottom: 20px; border-radius: var(--r);
      border: 1px solid rgba(167,139,250,0.3); background: rgba(167,139,250,0.07);
    }
    .source-banner__icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .source-banner__tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em;
      padding: 2px 8px; border-radius: 4px; margin-bottom: 4px;
      background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3);
    }
    .source-banner__title { font-size: 13px; font-weight: 600; color: #c4b5fd; margin-bottom: 3px; }
    .source-banner__desc { font-size: 12px; color: var(--dim); line-height: 1.5; }
    .source-banner__desc code { font-size: 11px; }

    /* ── Loading ── */
    #loading { display: flex; align-items: center; justify-content: center;
      height: 100vh; color: var(--dim); gap: 10px; }
    .spin { width: 17px; height: 17px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: rot .7s linear infinite; }
    @keyframes rot { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="loading"><span class="spin"></span>Carregando spec gerado do código…</div>
  <div id="app" style="display:none">
    <header class="topbar">
      <a class="back" href="../">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
      </a>
      <div class="topbar-info">
        <span class="topbar-title" id="t-title"></span>
        <span class="topbar-ver" id="t-ver"></span>
      </div>
      <span class="badge">⚡ Gerado do Código · Saunter</span>
    </header>
    <div class="layout">
      <nav class="sidebar" id="sidebar"></nav>
      <main class="main" id="main"></main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script>
  (function () {
    // ── Spec URL ──────────────────────────────────────────────────────────────
    var parts = window.location.pathname.split('/');
    parts.splice(-2);
    var SPEC_URL = window.location.origin + parts.join('/') + '/asyncapi-generated.json';

    // ── Helpers ───────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function md(text) {
      if (!text) return '';
      var s = esc(text)
        .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
        .replace(/^#{1,2} (.+)$/gm, '<h3>$1</h3>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>[\s\S]+?<\/li>)/g, '<ul>$1</ul>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/\n/g, '<br>');
      return '<p>' + s + '</p>';
    }

    function resolveRef(spec, ref) {
      if (!ref || !ref.startsWith('#/')) return null;
      var parts = ref.slice(2).split('/');
      var cur = spec;
      for (var p of parts) { cur = cur && cur[p]; }
      return cur || null;
    }

    function renderTypeLabel(schema) {
      if (!schema) return '<span class="typ">any</span>';
      if (schema['$ref']) {
        var name = schema['$ref'].split('/').pop();
        return '<span class="typ">' + esc(name) + '</span>';
      }
      if (schema.type === 'array') return '<span class="typ">array[' + renderTypeLabel(schema.items) + ']</span>';
      if (schema.enum) return '<span class="typ">enum</span>';
      return '<span class="typ">' + esc(schema.type || 'object') + '</span>';
    }

    function renderSchemaTable(spec, schema, required) {
      if (!schema) return '';
      // Resolve $ref at top level
      if (schema['$ref']) schema = resolveRef(spec, schema['$ref']) || schema;
      var props = schema.properties || {};
      var req   = required || schema.required || [];
      if (!Object.keys(props).length) return '<p style="color:var(--faint);font-size:12px">Sem propriedades definidas.</p>';
      var rows = '';
      for (var key of Object.keys(props)) {
        var prop = props[key];
        var isReq = req.includes(key);
        var desc  = prop.description || prop.const && ('Valor fixo: <code>' + esc(prop.const) + '</code>') || '';
        var enumV = prop.enum ? 'Valores: ' + prop.enum.map(function(v){ return '<code>' + esc(v) + '</code>'; }).join(', ') : '';
        rows += '<tr>'
          + '<td><span class="fn' + (isReq?' req':'') + '">' + esc(key) + '</span></td>'
          + '<td>' + renderTypeLabel(prop) + (prop.format ? ' <span style="font-size:10px;color:var(--faint)">(' + esc(prop.format) + ')</span>' : '') + '</td>'
          + '<td style="color:var(--dim)">' + (desc || enumV || '') + '</td>'
          + '</tr>';
      }
      return '<table class="schema-tbl"><thead><tr><th>Campo</th><th>Tipo</th><th>Descrição</th></tr></thead><tbody>' + rows + '</tbody></table>'
           + '<p style="font-size:11px;color:var(--faint);margin-top:6px">* campo obrigatório</p>';
    }

    // ── Rendering ─────────────────────────────────────────────────────────────
    function renderInfo(spec) {
      var info = spec.info || {};
      document.getElementById('t-title').textContent = info.title || 'AsyncAPI';
      document.getElementById('t-ver').textContent   = 'v' + (info.version || '');
      var html = '<div class="source-banner">'
               + '<span class="source-banner__icon">⚡</span>'
               + '<div>'
               + '<div class="source-banner__tag">Gerado do Código · Saunter</div>'
               + '<div class="source-banner__title">Spec gerado automaticamente via Saunter (C# → AsyncAPI)</div>'
               + '<div class="source-banner__desc">Este documento é gerado automaticamente a partir dos atributos C# '
               + '(<code>[Channel]</code>, <code>[PublishOperation]</code>, <code>[SubscribeOperation]</code>) '
               + 'no código-fonte da Orders API. <strong style="color:#c4b5fd">Atualizado pelo CI a cada push para main.</strong></div>'
               + '</div></div>'
               + '<h1>' + esc(info.title) + '</h1>'
               + '<div class="api-ver">v' + esc(info.version) + (info.contact ? ' · ' + esc(info.contact.name || '') : '') + '</div>';
      if (info.description) html += '<div class="desc-box">' + md(info.description) + '</div>';
      return html;
    }

    function renderServers(spec) {
      var servers = spec.servers || {};
      var keys = Object.keys(servers);
      if (!keys.length) return '';
      var cards = keys.map(function(k) {
        var s = servers[k];
        return '<div class="srv">'
          + '<div class="srv-name">' + esc(k) + '</div>'
          + '<div class="srv-url">' + esc(s.url) + '</div>'
          + '<span class="srv-proto">' + esc(s.protocol) + '</span>'
          + (s.description ? '<div class="srv-desc">' + esc(s.description) + '</div>' : '')
          + '</div>';
      }).join('');
      return '<h2 id="s-servers">Servidores</h2><div class="servers">' + cards + '</div>';
    }

    function renderChannels(spec) {
      var channels = spec.channels || {};
      var keys = Object.keys(channels);
      if (!keys.length) return '';
      var html = '<h2 id="s-channels">Canais &amp; Operações</h2>';
      keys.forEach(function(k) {
        var ch  = channels[k];
        var pub = ch.publish;
        var sub = ch.subscribe;
        var op  = pub || sub;
        var opType = pub ? 'pub' : 'sub';
        var opLabel = pub ? 'PUBLISH' : 'SUBSCRIBE';

        // Resolve message
        var msgRef = op && op.message && op.message['$ref'];
        var msgName = msgRef ? msgRef.split('/').pop() : '';
        var msg = msgRef ? resolveRef(spec, msgRef) : (op && op.message);

        html += '<div class="ch-card" id="c-' + esc(k) + '">'
          + '<div class="ch-head"><span class="ob ' + opType + '">' + opLabel + '</span>'
          + '<span class="ch-name">' + esc(k) + '</span></div>'
          + '<div class="ch-body">';

        if (ch.description) html += '<div class="ch-desc">' + md(ch.description) + '</div>';

        if (op) {
          html += '<div class="op-row"><span class="op-lbl">Operação</span><span>' + esc(op.summary || '') + '</span></div>';
          if (op.description) html += '<div class="op-row"><span class="op-lbl">Detalhe</span><span style="color:var(--dim)">' + esc(op.description) + '</span></div>';
          if (msgName) html += '<div class="op-row"><span class="op-lbl">Mensagem</span><code>' + esc(msgName) + '</code></div>';
        }

        if (msg && msg.payload) {
          var payload = msg.payload['$ref'] ? resolveRef(spec, msg.payload['$ref']) : msg.payload;
          if (payload) {
            html += '<h3>Payload</h3>' + renderSchemaTable(spec, payload, payload.required);
          }
        }

        if (msg && msg.headers) {
          html += '<h3>Headers</h3>' + renderSchemaTable(spec, msg.headers, msg.headers.required);
        }

        if (msg && msg.examples && msg.examples.length) {
          var ex = msg.examples[0];
          html += '<h3>Exemplo</h3><pre>' + esc(JSON.stringify(ex.payload || ex, null, 2)) + '</pre>';
        }

        html += '</div></div>';
      });
      return html;
    }

    function renderSchemas(spec) {
      var schemas = spec.components && spec.components.schemas;
      if (!schemas || !Object.keys(schemas).length) return '';
      var html = '<h2 id="s-schemas">Schemas de Componentes</h2>';
      Object.keys(schemas).forEach(function(k) {
        var s = schemas[k];
        html += '<div class="msg-card" id="sc-' + esc(k) + '">'
          + '<div class="msg-head"><div class="msg-name">' + esc(k) + '</div>'
          + (s.description ? '<div class="msg-sum">' + esc(s.description) + '</div>' : '')
          + '</div>'
          + '<div class="msg-body">' + renderSchemaTable(spec, s, s.required) + '</div>'
          + '</div>';
      });
      return html;
    }

    // ── Sidebar ───────────────────────────────────────────────────────────────
    function buildSidebar(spec) {
      var channels = spec.channels || {};
      var schemas  = (spec.components && spec.components.schemas) || {};
      var html = '';

      if (Object.keys(channels).length) {
        html += '<div class="sg-label">Canais</div>';
        Object.keys(channels).forEach(function(k) {
          var ch  = channels[k];
          var pub = ch.publish;
          var opType = pub ? 'pub' : 'sub';
          var opLabel = pub ? 'PUB' : 'SUB';
          html += '<a class="si" href="#c-' + esc(k) + '">'
            + '<span class="ob ' + opType + '">' + opLabel + '</span>'
            + esc(k) + '</a>';
        });
      }

      if (Object.keys(schemas).length) {
        html += '<div class="sg-label" style="margin-top:8px">Schemas</div>';
        Object.keys(schemas).forEach(function(k) {
          html += '<a class="si" href="#sc-' + esc(k) + '">' + esc(k) + '</a>';
        });
      }

      return html;
    }

    // ── Smooth anchor ─────────────────────────────────────────────────────────
    function bindAnchors() {
      document.getElementById('sidebar').addEventListener('click', function(e) {
        var a = e.target.closest('a');
        if (!a) return;
        e.preventDefault();
        var id = (a.getAttribute('href') || '').slice(1);
        var el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.querySelectorAll('.si').forEach(function(x){ x.classList.remove('active'); });
        a.classList.add('active');
      });
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    fetch(SPEC_URL)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status + ' ao carregar ' + SPEC_URL);
        return r.text();
      })
      .then(function(text) {
        var spec = JSON.parse(text);

        document.getElementById('main').innerHTML =
          renderInfo(spec)
          + renderServers(spec)
          + renderChannels(spec)
          + renderSchemas(spec);

        document.getElementById('sidebar').innerHTML = buildSidebar(spec);

        bindAnchors();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
      })
      .catch(function(err) {
        document.getElementById('loading').innerHTML =
          '<span style="color:#f87171">Erro: ' + err.message + '</span>';
      });
  })();
  </script>
</body>
</html>
