<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Interactive API Reference — Orders Platform" />
  <title>API Reference — Orders Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0f0f17;
    }

    .docs-back {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 10000;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: rgba(12, 12, 22, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      color: rgba(220, 220, 240, 0.85);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }

    .docs-back:hover {
      background: rgba(25, 25, 45, 0.96);
      border-color: rgba(100, 200, 255, 0.28);
      color: #fff;
    }

    .docs-back svg {
      flex-shrink: 0;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <a class="docs-back" href="../../">
    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back to docs
  </a>

  <script>
    var configuration = {
      spec: { url: '../../openapi.json' },
      theme: 'purple',
      darkMode: true,
      layout: 'modern',
      defaultHttpClient: {
        targetKey: 'shell',
        clientKey: 'curl',
      },
      hiddenClients: [],
      metadata: {
        title: 'Orders Platform — API Reference',
      },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference" crossorigin="anonymous"></script>
</body>
</html>
